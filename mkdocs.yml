site_name: Documentation A/B testing
site_description: Solution abtest-solution, données campagnes/segments, consentement et intégration hôte.
site_url: https://skhamvon.github.io/abtest-docs/
repo_url: https://github.com/skhamvon/abtest-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tables
  - tables

nav:
  - Accueil: index.md
  - Architecture: architecture.md
  - Données campagnes & segments: campaigns-data.md
  - Consentement & confidentialité: consent-privacy.md
  - Référence segments: segments-reference.md
  - Intégration hôte (remote): integration-host.md
  - Développement: development.md
